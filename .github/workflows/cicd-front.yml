name: CI/CD Front Despacho

on:
  push:
    branches: [ "deploy" ]
    paths:
      - 'front_despacho/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./front_despacho

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and Push to ECR
        env:
          ECR_REPOSITORY_URI: ${{ secrets.ECR_REPO_FRONT }}
        run: |
          docker build -t $ECR_REPOSITORY_URI:latest .
          docker push $ECR_REPOSITORY_URI:latest

      - name: Deploy to EC2
        run: |
          aws ssm send-command \
            --instance-ids ${{ secrets.EC2_FRONTEND_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "docker pull ${{ secrets.ECR_REPO_FRONT }}:latest",
              "docker stop front-despacho || true",
              "docker rm front-despacho || true",
              "docker run -d --restart always --name front-despacho -p 80:80 ${{ secrets.ECR_REPO_FRONT }}:latest"
            ]' \
            --region ${{ secrets.AWS_REGION }}