name: CI/CD Back Despachos

on:
  push:
    branches: [ "deploy" ]
    paths:
      - 'back-Despachos_SpringBoot/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and Push
        run: |
          docker build -t ${{ secrets.ECR_REPO_BACK_DESPACHOS }}:latest .
          docker push ${{ secrets.ECR_REPO_BACK_DESPACHOS }}:latest

      - name: Deploy to EC2
        run: |
          aws ssm send-command \
            --instance-ids ${{ secrets.EC2_BACKEND_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "docker pull ${{ secrets.ECR_REPO_BACK_DESPACHOS }}:latest",
              "docker stop back-despachos || true",
              "docker rm back-despachos || true",
              "docker run -d --restart always --name back-despachos -p 8081:8080 ${{ secrets.ECR_REPO_BACK_DESPACHOS }}:latest"
            ]' \
            --region ${{ secrets.AWS_REGION }}