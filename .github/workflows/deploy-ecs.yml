name: CI/CD ECS (Innovatech EP3)

# Pipeline unico: build -> push a ECR -> deploy del stack CloudFormation a ECS.
# Se dispara con push a 'deploy' o manualmente desde la pestana Actions.
on:
  push:
    branches: [ "deploy" ]
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  STACK_NAME: innova-ecs
  ECR_FRONT: innova/front
  ECR_VENTAS: innova/ventas
  ECR_DESPACHOS: innova/despachos

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repositories exist
        run: |
          for repo in "$ECR_FRONT" "$ECR_VENTAS" "$ECR_DESPACHOS"; do
            aws ecr describe-repositories --repository-names "$repo" >/dev/null 2>&1 \
              || aws ecr create-repository --repository-name "$repo" >/dev/null
          done

      - name: Set image tag
        id: vars
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build & push Frontend
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          TAG: ${{ steps.vars.outputs.tag }}
        run: |
          docker build -t "$REGISTRY/$ECR_FRONT:$TAG" ./front_despacho
          docker push "$REGISTRY/$ECR_FRONT:$TAG"

      - name: Build & push Back Ventas
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          TAG: ${{ steps.vars.outputs.tag }}
        run: |
          docker build -t "$REGISTRY/$ECR_VENTAS:$TAG" ./back-Ventas_SpringBoot/Springboot-API-REST
          docker push "$REGISTRY/$ECR_VENTAS:$TAG"

      - name: Build & push Back Despachos
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          TAG: ${{ steps.vars.outputs.tag }}
        run: |
          docker build -t "$REGISTRY/$ECR_DESPACHOS:$TAG" ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
          docker push "$REGISTRY/$ECR_DESPACHOS:$TAG"

      - name: Deploy CloudFormation stack
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          TAG: ${{ steps.vars.outputs.tag }}
        run: |
          aws cloudformation deploy \
            --stack-name "$STACK_NAME" \
            --template-file infra/ecs.yml \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              ImageFront="$REGISTRY/$ECR_FRONT:$TAG" \
              ImageVentas="$REGISTRY/$ECR_VENTAS:$TAG" \
              ImageDespachos="$REGISTRY/$ECR_DESPACHOS:$TAG"

      - name: Show app URL
        run: |
          aws cloudformation describe-stacks --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs" --output table
