server {
    listen 80;
    server_name _;

    # =========================
    # FRONTEND
    # =========================
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # =========================
    # VENTAS (8080)
    # =========================
    location /api-ventas/ {
        proxy_pass http://10.0.138.18:8080/api-ventas/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Swagger Ventas
    location /api-ventas/swagger-ui/ {
        proxy_pass http://10.0.138.18:8080/api-ventas/swagger-ui/;
    }

    location /api-ventas/v3/api-docs {
        proxy_pass http://10.0.138.18:8080/api-ventas/v3/api-docs;
    }

    # =========================
    # DESPACHOS (8081)
    # =========================

    location /api-despachos/ {
        proxy_pass http://10.0.138.18:8081/api-despachos/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api-despachos/swagger-ui/ {
        proxy_pass http://10.0.138.18:8081/api-despachos/swagger-ui/;
    }

    location /api-despachos/v3/api-docs {
        proxy_pass http://10.0.138.18:8081/api-despachos/v3/api-docs;
    }
}