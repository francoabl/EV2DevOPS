server {
    listen 80;
    server_name _;

    # En EKS no hay ALB que enrute por path: el propio nginx del front reenvia
    # /api-ventas/* y /api-despachos/* a los Services de Kubernetes (por su
    # nombre DNS). Los mismos nombres funcionan en docker-compose local.
    location /api-ventas/ {
        proxy_pass http://back-ventas:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api-despachos/ {
        proxy_pass http://back-despachos:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }
}
