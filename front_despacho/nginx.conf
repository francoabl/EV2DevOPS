server {
    listen 80;
    server_name _;

    # En ECS el routing /api-ventas/* y /api-despachos/* lo resuelve el ALB
    # (reglas por path), por lo que el contenedor del front solo sirve el SPA.
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }
}
