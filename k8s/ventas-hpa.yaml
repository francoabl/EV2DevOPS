apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: back-ventas-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: back-ventas
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50   # escala al superar 50% de la CPU solicitada
